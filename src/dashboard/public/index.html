<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bot Dashboard</title>
    <!-- Kita pakai Tailwind CSS agar tampilannya modern dan cantik tanpa ngoding CSS panjang -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 font-sans">
    
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-indigo-400 mb-8 text-center">📻 Bot Radio Dashboard</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Kolom Kiri: Now Playing -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold text-gray-300 mb-4">🎵 Sedang Diputar</h2>
                
                <div id="now-playing" class="text-center py-4">
                    <p class="text-gray-400 italic">Memuat data bot...</p>
                </div>
            </div>

            <!-- Kolom Kanan: Info Sistem -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold text-gray-300 mb-4">ℹ️ Info Sistem</h2>
                <div class="space-y-3">
                    <p class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Status Bot</span>
                        <span id="status" class="font-bold">-</span>
                    </p>
                    <p class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Genre Terjadwal</span>
                        <span id="genre" class="font-semibold text-indigo-300">-</span>
                    </p>
                    <p class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Mesin Pencari (Engine)</span>
                        <span id="engine" class="font-semibold text-red-400">-</span>
                    </p>
                    <p class="flex justify-between pt-1">
                        <span class="text-gray-400">Total Lagu Diputar</span>
                        <span id="song-count" class="font-semibold">-</span>
                    </p>
                </div>

                <!-- Bagian Kontrol Ganti Genre -->
                <div class="mt-6 border-t border-gray-700 pt-4">
                    <h3 class="text-lg font-semibold text-gray-300 mb-2">🎛️ Kendali Radio</h3>
                    <div class="flex gap-2">
                        <input type="text" id="genre-input" placeholder="Masukkan judul genre/penyanyi..." 
                            class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                        <button onclick="changeGenre()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors">
                            Ubah
                        </button>
                    </div>
                    <p id="genre-msg" class="text-xs mt-2 hidden"></p>
                </div>
            </div>
        </div>

        <!-- Kolom Bawah: Antrean -->
        <div class="mt-6 bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold text-gray-300 mb-4">📋 Antrean Request (<span id="queue-length">0</span>)</h2>
            <ul id="queue-list" class="space-y-2">
                <li class="p-3 bg-gray-700 rounded text-gray-400 text-center">Memuat antrean...</li>
            </ul>
        </div>

        <!-- Kolom Paling Bawah: Pengaturan Jadwal -->
        <div class="mt-6 bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold text-gray-300 mb-4">🗓️ Pengaturan Jadwal Genre Harian</h2>
            
            <div class="mb-4 flex flex-col sm:flex-row gap-2">
                <!-- Gunakan input hidden untuk menyimpan ID jadwal yang sedang diedit -->
                <input type="hidden" id="schedule-id">
                <input type="time" id="schedule-start" class="bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" required>
                <input type="time" id="schedule-end" class="bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" required>
                <input type="text" id="schedule-genre" placeholder="Genre (ex: lofi hiphop)" class="flex-1 bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" required>
                
                <button id="btn-save-schedule" onclick="saveSchedule()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors">
                    + Tambah
                </button>
                <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors">
                    Batal
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-400 border-collapse">
                    <thead class="text-xs text-gray-300 uppercase bg-gray-700">
                        <tr>
                            <th scope="col" class="px-4 py-3 rounded-tl-lg">Mulai</th>
                            <th scope="col" class="px-4 py-3">Selesai</th>
                            <th scope="col" class="px-4 py-3">Genre</th>
                            <th scope="col" class="px-4 py-3 rounded-tr-lg">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-table-body">
                        <tr>
                            <td colspan="4" class="px-4 py-4 text-center">Memuat jadwal...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p id="schedule-msg" class="text-xs mt-3 hidden"></p>
        </div>

    </div>

    <script>
        // Fungsi untuk mengambil data bot dan memperbarui tampilan (auto-refresh)
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Update Info Sistem
                document.getElementById('status').innerHTML = data.isPlaying 
                    ? '<span class="text-green-400">🟢 Mengudara</span>' 
                    : '<span class="text-red-400">🔴 Berhenti</span>';
                
                document.getElementById('genre').innerText = data.currentGenre;
                document.getElementById('engine').innerText = data.engine.toUpperCase();
                document.getElementById('song-count').innerText = data.songCount;

                // Update Now Playing
                const npEl = document.getElementById('now-playing');
                if (data.currentSong) {
                    const mode = data.isRadioPlaying 
                        ? '<span class="bg-indigo-600 text-xs px-2 py-1 rounded-full uppercase ml-2">Mode Radio Auto</span>' 
                        : '<span class="bg-pink-600 text-xs px-2 py-1 rounded-full uppercase ml-2">Mode Request User</span>';

                    npEl.innerHTML = `
                        <div class="mb-3">
                            <h3 class="text-2xl font-bold text-white mb-1 line-clamp-2">${data.currentSong.title}</h3>
                            <p class="text-gray-400">${data.currentSong.author} ${mode}</p>
                        </div>
                        <a href="${data.currentSong.uri}" target="_blank" class="inline-block mt-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Buka di ${data.engine.toUpperCase()}</a>
                    `;
                } else {
                    npEl.innerHTML = '<p class="text-gray-500 italic py-4">Bot sedang diam / idle.</p>';
                }

                // Update Queue List
                document.getElementById('queue-length').innerText = data.queue.length;
                const queueEl = document.getElementById('queue-list');
                queueEl.innerHTML = '';
                
                if (data.queue.length > 0) {
                    data.queue.forEach((song, i) => {
                        const li = document.createElement('li');
                        li.className = "p-3 bg-gray-700 rounded flex gap-3 items-center hover:bg-gray-600 transition-colors";
                        li.innerHTML = `
                            <span class="bg-gray-900 text-gray-400 font-bold px-3 py-1 rounded">${i + 1}</span>
                            <div class="flex-1 truncate">
                                <p class="font-semibold text-white truncate">${song.title}</p>
                                <p class="text-xs text-gray-400">${song.author}</p>
                            </div>
                        `;
                        queueEl.appendChild(li);
                    });
                } else {
                    queueEl.innerHTML = '<li class="p-4 bg-gray-700 rounded text-gray-400 text-center italic">Tidak ada lagu yang mengantre.</li>';
                }
            } catch (err) {
                console.error('Gagal terhubung ke API Dashboard', err);
            }
        }

        // Fungsi untuk menembak API Ganti Genre
        async function changeGenre() {
            const input = document.getElementById('genre-input');
            const msgEl = document.getElementById('genre-msg');
            const genre = input.value.trim();

            if (!genre) return;

            try {
                const res = await fetch('/api/genre', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ genre: genre })
                });
                
                const data = await res.json();
                
                msgEl.classList.remove('hidden');
                msgEl.classList.add(data.success ? 'text-green-400' : 'text-red-400');
                msgEl.innerText = data.success ? `✅ Genre terganti! (Lagu segera berubah)` : '❌ Gagal mengganti genre';
                
                input.value = ''; // Kosongkan input
                
                // Hilangkan pesan sukses setelah 3 detik
                setTimeout(() => msgEl.classList.add('hidden'), 3000);
                
                fetchStatus(); // Paksa refresh layar sekarang juga
            } catch(e) {
                console.error('Error:', e);
            }
        }

        // Jalankan fetchStatus setiap 2 detik sekali agar layarnya update seperti real-time!
        setInterval(fetchStatus, 2000);
        fetchStatus();

        // === FUNGSI JADWAL HARIAN ===
        async function fetchSchedules() {
            try {
                const res = await fetch('/api/schedules');
                const result = await res.json();
                
                const tbody = document.getElementById('schedule-table-body');
                tbody.innerHTML = '';
                
                if (result.data && result.data.length > 0) {
                    result.data.forEach(sched => {
                        const tr = document.createElement('tr');
                        tr.className = 'border-b border-gray-700 hover:bg-gray-600 transition-colors cursor-default';
                        tr.innerHTML = `
                            <td class="px-4 py-3">${sched.start_time}</td>
                            <td class="px-4 py-3">${sched.end_time}</td>
                            <td class="px-4 py-3 text-indigo-300">${sched.genre}</td>
                            <td class="px-4 py-3">
                                <button onclick="editSchedule(${sched.id}, '${sched.start_time}', '${sched.end_time}', '${sched.genre}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-xs transition-colors mr-1">Edit</button>
                                <button onclick="deleteSchedule(${sched.id})" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs transition-colors">Hapus</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-4 text-center text-gray-400 italic">Belum ada jadwal</td></tr>`;
                }
            } catch (e) {
                console.error('Error fetching schedules:', e);
            }
        }

        function editSchedule(id, start, end, genre) {
            document.getElementById('schedule-id').value = id;
            document.getElementById('schedule-start').value = start;
            document.getElementById('schedule-end').value = end;
            document.getElementById('schedule-genre').value = genre;
            
            const btnSave = document.getElementById('btn-save-schedule');
            btnSave.innerText = "Simpan Perubahan";
            btnSave.classList.replace('bg-green-600', 'bg-indigo-600');
            btnSave.classList.replace('hover:bg-green-700', 'hover:bg-indigo-700');
            
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('schedule-id').value = '';
            document.getElementById('schedule-start').value = '';
            document.getElementById('schedule-end').value = '';
            document.getElementById('schedule-genre').value = '';
            
            const btnSave = document.getElementById('btn-save-schedule');
            btnSave.innerText = "+ Tambah";
            btnSave.classList.replace('bg-indigo-600', 'bg-green-600');
            btnSave.classList.replace('hover:bg-indigo-700', 'hover:bg-green-700');
            
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        async function saveSchedule() {
            const id = document.getElementById('schedule-id').value;
            const start = document.getElementById('schedule-start').value;
            const end = document.getElementById('schedule-end').value;
            const genre = document.getElementById('schedule-genre').value.trim();
            const msgEl = document.getElementById('schedule-msg');

            if (!start || !end || !genre) {
                msgEl.innerText = "❌ Harap isi Jam Mulai, Jam Selesai, dan Genre!";
                msgEl.className = "text-xs mt-3 text-red-400 block";
                return setTimeout(() => msgEl.classList.add('hidden'), 3000);
            }

            const isEdit = id !== '';
            const endpoint = isEdit ? '/api/schedules/update' : '/api/schedules/add';
            const bodyData = { start_time: start, end_time: end, genre };
            if (isEdit) bodyData.id = id;

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    msgEl.innerText = isEdit ? "✅ Jadwal berhasil diperbarui!" : "✅ Jadwal berhasil ditambahkan!";
                    msgEl.className = "text-xs mt-3 text-green-400 block";
                    cancelEdit(); // Reset form & tombol
                    fetchSchedules(); // Refresh table
                } else {
                    msgEl.innerText = `❌ Gagal: ${data.message}`;
                    msgEl.className = "text-xs mt-3 text-red-400 block";
                }
            } catch (e) {
                console.error(e);
            }
            setTimeout(() => msgEl.classList.add('hidden'), 3000);
        }

        async function deleteSchedule(id) {
            if (!confirm('Hapus jadwal ini?')) return;
            try {
                const res = await fetch('/api/schedules/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.success) {
                    fetchSchedules();
                } else {
                    alert('Gagal menghapus: ' + data.message);
                }
            } catch (e) {
                console.error(e);
            }
        }

        // Panggil pertama kali
        fetchSchedules();

    </script>
</body>
</html>
